      - src/recsys/utils/config.py
      - src/recsys/utils/logger.py
      - configs/data_config.yaml
      - configs/training_config.yaml
      - configs/data_versions
      - configs/model_profiles
      - data/versions
      - metrics/best_model.json
    outs:
      - models/retrained_selected/latest:
          cache: true
      - data/retrained_selected/trainval_examples.parquet
      - data/retrained_selected/val_examples_empty.parquet
    metrics:
      - metrics/retrained_selected/training_metrics.json:
          cache: false
      - metrics/retrained_selected/evaluation_metrics.json:
          cache: false
      - metrics/retrained_selected/retrain_result.json:
          cache: false

  promote_retrained_model:
    wdir: ../..
    cmd: >
      python -m recsys.training.select_model
      --training-config configs/training_config.yaml
      --training-metrics-path metrics/retrained_selected/training_metrics.json
      --output-path metrics/promotion_result.json
      --canonical-model-name recsys-serving
      --target-alias Production
    deps:
      - src/recsys/training/select_model.py
      - src/recsys/training/tracking.py
      - src/recsys/utils/config.py
      - configs/training_config.yaml
      - metrics/retrained_selected/training_metrics.json
    outs:
