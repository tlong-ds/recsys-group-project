stages:
  train_baseline:
    wdir: ../..
    cmd: python -m recsys.training.pipeline --stage train --dvc-mode --data-config configs/data_config.yaml --model-config configs/model_config.yaml --training-config configs/training_config.yaml --params params.yaml --registry-root models/trained/baseline --train-metrics-path metrics/baseline/training_metrics.json
    params:
      - params.yaml:
          - model.type
          - model.variant
          - model.name
          - model.version
          - model.embedding_dim
          - model.hidden_size
          - model.step
          - model.max_session_length
          - model.fallback_weight
          - model.score_chunk_size
          - training.top_k
      - configs/training_config.yaml:
          - training.seed
          - training.batch_size
          - training.device
          - training.num_epochs
          - training.lr
          - training.weight_decay
          - training.early_stopping_patience
          - training.early_stopping_min_delta
          - training.num_workers
          - training.pin_memory
          - training.persistent_workers
          - training.prefetch_factor
    deps:
      - src/recsys/training/pipeline.py
      - src/recsys/training/mlflow_registry.py
      - src/recsys/training/trainer.py
      - src/recsys/training/registry.py
      - src/recsys/training/tracking.py
      - src/recsys/models/graph_helpers.py
      - src/recsys/models/srgnn.py
      - src/recsys/models/ggnn.py
      - src/recsys/evaluation/evaluator.py
      - src/recsys/evaluation/metrics.py
      - src/recsys/utils/config.py
      - src/recsys/utils/logger.py
      - configs/data_config.yaml
      - configs/model_config.yaml
      - configs/training_config.yaml
      - params.yaml
      - data/processed/train_examples.parquet
      - data/processed/val_examples.parquet
      - data/processed/item_vocab.json
      - data/processed/data_stats.json
    outs:
      - models/trained/baseline/latest:
          cache: true
    metrics:
      - metrics/baseline/training_metrics.json:
          cache: false

  eval_baseline:
    wdir: ../..
    cmd: python -m recsys.training.pipeline --stage evaluate --dvc-mode --data-config configs/data_config.yaml --model-config configs/model_config.yaml --training-config configs/training_config.yaml --params params.yaml --registry-root models/trained/baseline --evaluation-metrics-path metrics/baseline/evaluation_metrics.json
    params:
      - params.yaml:
          - model.type
          - model.variant
          - model.name
          - model.version
          - model.embedding_dim
          - model.hidden_size
          - model.step
          - model.max_session_length
          - model.fallback_weight
          - model.score_chunk_size
          - training.top_k
      - configs/training_config.yaml:
          - training.device
          - training.top_k
    deps:
      - src/recsys/training/pipeline.py
      - src/recsys/training/mlflow_registry.py
      - src/recsys/training/tracking.py
      - src/recsys/training/registry.py
      - src/recsys/models/graph_helpers.py
      - src/recsys/models/srgnn.py
      - src/recsys/models/ggnn.py
      - src/recsys/evaluation/evaluator.py
      - src/recsys/evaluation/metrics.py
      - src/recsys/utils/config.py
      - src/recsys/utils/logger.py
      - configs/data_config.yaml
      - configs/model_config.yaml
      - configs/training_config.yaml
      - params.yaml
      - models/trained/baseline/latest
      - data/processed/test_examples.parquet
      - data/processed/data_stats.json
    metrics:
      - metrics/baseline/evaluation_metrics.json:
          cache: false

