  train_matrix:
    wdir: ../..
    matrix:
      data_version:
        - baseline
        - v1_strict_filter
        - v2_sliding_window
      model_profile:
        - srgnn
        - srgnn_fc
        - srgnn_l
        - srgnn_avg
        - srgnn_att
        - ggnn
    cmd: >
      python -m recsys.training.pipeline --stage train --dvc-mode
      --data-config configs/data_config.yaml
      --model-config configs/model_profiles/${item.model_profile}.yaml
      --training-config configs/training_config.yaml
