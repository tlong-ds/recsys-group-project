  select_best_model:
    wdir: ../..
    cmd: >
      python -m recsys.training.select_model
      --select-only
      --best-model-path metrics/best_model.json
      --experiments-root metrics/experiments
    deps:
      - src/recsys/training/select_model.py
      - metrics/experiments
    outs:
      - metrics/best_model.json:
          cache: false

  retrain_selected_model:
    wdir: ../..
    cmd: >
      python -m recsys.training.retrain_selected
      --best-model-path metrics/best_model.json
      --data-config configs/data_config.yaml
      --training-config configs/training_config.yaml
      --data-version-config-root configs/data_versions
      --model-profile-config-root configs/model_profiles
      --retrain-data-root data/retrained_selected
      --registry-root models/retrained_selected
      --train-metrics-path metrics/retrained_selected/training_metrics.json
      --evaluation-metrics-path metrics/retrained_selected/evaluation_metrics.json
      --output-path metrics/retrained_selected/retrain_result.json
    deps:
      - src/recsys/training/retrain_selected.py
      - src/recsys/training/pipeline.py
      - src/recsys/training/trainer.py
