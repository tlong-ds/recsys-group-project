services:
  api:
    build: .
    command: ["recsys-serve", "--config", "configs/serving_config.yaml"]
    ports:
      - "8000:8000"
    environment:
      RECSYS_MODEL_PATH: /app/models/trained/latest/model.json
      RECSYS_API_KEYS: ${RECSYS_API_KEYS:?Set RECSYS_API_KEYS before starting compose}
    volumes:
      - ./configs:/app/configs
      - ./models:/app/models
    depends_on:
      - mlflow

  streamlit:
    build: .
    command:
      [
        "streamlit",
        "run",
        "streamlit_app/app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501"
      ]
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api

  mlflow:
    image: python:3.11-slim
    command:
      [
        "/bin/sh",
        "-c",
        "pip install mlflow==2.12.2 && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts"
      ]
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./deployment/mlflow:/mlflow

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./deployment/monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - ./deployment/secrets/recsys-api-key:/etc/prometheus/secrets/recsys-api-key:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./deployment/monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD before starting compose}
    depends_on:
      - prometheus
