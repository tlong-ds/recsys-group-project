name: recsys-local

services:
  api:
    build: .
    command: ["recsys-serve", "--config", "configs/serving_compose.yaml"]
    env_file:
      - .env
    environment:
      RECSYS_SERVING_CONFIG: /app/configs/serving_compose.yaml
      RECSYS_MODEL_CACHE_ROOT: /app/models/cache
      RECSYS_MODEL_PATH: /app/models/trained/v1_strict_filter/latest
      RECSYS_API_KEYS: ${RECSYS_API_KEYS:?Set RECSYS_API_KEYS in .env}
    ports:
      - "8000:8000"
    volumes:
      - ./configs:/app/configs:ro
      - ./models/trained/v1_strict_filter/latest:/app/models/trained/v1_strict_filter/latest:ro
      - model_cache:/app/models/cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks: [recsys]

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks: [recsys]

  mlflow:
    image: python:3.11-slim
    profiles: ["tracking"]
    command:
      [
        "/bin/sh",
        "-c",
        "pip install --no-cache-dir mlflow==2.12.2 && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts",
      ]
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:5000/ >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks: [recsys]

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployment/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./deployment/secrets/recsys-api-key:/etc/prometheus/secrets/recsys-api-key:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=6h"
      - "--storage.tsdb.retention.size=256MB"
      - "--web.enable-lifecycle"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1:9090/-/healthy >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks: [recsys]

  grafana:
    image: grafana/grafana:11.2.2
    profiles: ["observability"]
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./deployment/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployment/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks: [recsys]

networks:
  recsys:
    driver: bridge

volumes:
  mlflow_data:
  prometheus_data:
  grafana_data:
  model_cache:
  frontend_node_modules:
