name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check src tests

      - name: Unit tests
        env:
          RECSYS_API_KEYS: ci-test-key
        run: pytest

      - name: Compile
        run: python -m compileall src

      - name: Bandit
        run: bandit -q -r src

      - name: pip-audit
        run: pip-audit --ignore-vuln CVE-2025-69872 --skip-editable

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
