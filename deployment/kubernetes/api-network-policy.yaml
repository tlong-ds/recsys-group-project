apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: recsys-api-ingress
  namespace: recsys
spec:
  podSelector:
    matchLabels:
      app: recsys-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: recsys
        - podSelector:
            matchLabels:
              app: prometheus
        - podSelector:
            matchLabels:
              app: recsys-api-client
        # Allow ingress from the VPC (ALB target-type: ip)
        # In production, replace with your actual VPC CIDR for tighter security.
        - ipBlock:
            cidr: 0.0.0.0/0 
      ports:
        - protocol: TCP
          port: 8000
