apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: recsys
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.2.1
          ports:
            - name: http
              containerPort: 9090
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: config
              mountPath: /etc/prometheus/alerts.yml
              subPath: alerts.yml
              readOnly: true
            - name: api-key
              mountPath: /etc/prometheus/secrets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: api-key
          secret:
            secretName: recsys-monitoring-secrets
            items:
              - key: recsys-api-key
                path: recsys-api-key

