apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: recsys
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.6.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recsys-monitoring-secrets
                  key: grafana-admin-password
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards/recsys.yml
              subPath: recsys.yml
              readOnly: true
            - name: dashboards
              mountPath: /etc/grafana/dashboards/recsys-api.json
              subPath: recsys-api.json
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasources
        - name: dashboards
          configMap:
            name: grafana-dashboards
