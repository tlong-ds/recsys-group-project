apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-api
  namespace: recsys
  labels:
    app: recsys-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recsys-api
  template:
    metadata:
      labels:
        app: recsys-api
    spec:
      serviceAccountName: recsys-api
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: recsys-api
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: recsys-api
      initContainers:
        - name: model-downloader
          image: ghcr.io/tlong-ds/recsys-group-project:main
          imagePullPolicy: Always
          command:
            - python3
            - "-c"
            - |
              import os
              from recsys.serving.predictor import Predictor
              from recsys.utils.config import load_config
              cfg = load_config('/app/configs/serving_config.yaml')
              mlflow_cfg = cfg.get('mlflow', {})
              reg_cfg = cfg.get('serving', {}).get('model_registry', {})
              print(f"Downloading model {reg_cfg.get('model_name')} (alias: {reg_cfg.get('model_alias')})...")
              Predictor.from_model_registry(
                  mlflow_config=mlflow_cfg,
                  model_name=reg_cfg.get('model_name'),
                  model_alias=reg_cfg.get('model_alias'),
                  cache_dir='/app/models/cache'
              )
              print("Download complete.")
          env:
            - name: DAGSHUB_USER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: dagshub-user-token
          volumeMounts:
            - name: config-volume
              mountPath: /app/configs/serving_config.yaml
              subPath: serving_config.yaml
              readOnly: true
            - name: model-cache
              mountPath: /app/models/cache
      containers:
        - name: api
          image: ghcr.io/tlong-ds/recsys-group-project:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: RECSYS_SERVING_CONFIG
              value: /app/configs/serving_config.yaml
            - name: RECSYS_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: api-keys
            - name: DAGSHUB_USER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: dagshub-user-token
          volumeMounts:
            - name: config-volume
              mountPath: /app/configs/serving_config.yaml
              subPath: serving_config.yaml
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
            - name: model-cache
              mountPath: /app/models/cache
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config-volume
          configMap:
            name: recsys-serving-config
        - name: tmp-volume
          emptyDir: {}
        - name: model-cache
          emptyDir: {}
