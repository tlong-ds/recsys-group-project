apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-api
  namespace: recsys
  labels:
    app: recsys-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recsys-api
  template:
    metadata:
      labels:
        app: recsys-api
    spec:
      serviceAccountName: recsys-api
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: recsys-api
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: recsys-api
      containers:
        - name: api
          image: ghcr.io/tlong-ds/recsys-group-project:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: RECSYS_MODEL_PATH
              value: /app/models/trained/latest/
            - name: RECSYS_SERVING_CONFIG
              value: /app/configs/serving_config.yaml
            - name: RECSYS_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: api-keys
            - name: DAGSHUB_USER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: dagshub-user-token
          volumeMounts:
            - name: config-volume
              mountPath: /app/configs/serving_config.yaml
              subPath: serving_config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config-volume
          configMap:
            name: recsys-serving-config
