apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: recsys
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    rule_files:
      - "/etc/prometheus/alerts.yml"

    scrape_configs:
      - job_name: recsys-api
        bearer_token_file: /etc/prometheus/secrets/recsys-api-key
        static_configs:
          - targets: ["recsys-api.recsys.svc.cluster.local:80"]
  alerts.yml: |
    groups:
      - name: recsys-api
        rules:
          - alert: RecSysApiDown
            expr: up{job="recsys-api"} == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "RecSys API is unreachable"

