# ── Active experiment ────────────────────────────────────────────────────────
model:
  type:    srgnn          # architecture family
  variant: srgnn          # SR-GNN readout variant (ignored for tagnn / ggnn)
  name:    srgnn          # artifact / mlflow registered model name
  version: "0.1.0"

  embedding_dim:      128
  hidden_size:        128  # must equal embedding_dim
  step:               1
  max_session_length: 20
  fallback_weight:    0.05


