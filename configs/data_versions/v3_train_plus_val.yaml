data:
  interim_path: data/versions/v3_train_plus_val/interim
  processed_path: data/versions/v3_train_plus_val/processed
  train_examples_path: data/versions/v3_train_plus_val/processed/train_examples.parquet
  val_examples_path: data/versions/v3_train_plus_val/processed/val_examples.parquet
  test_examples_path: data/versions/v3_train_plus_val/processed/test_examples.parquet
  item_vocab_path: data/versions/v3_train_plus_val/processed/item_vocab.json
  logging:
    report_path: data/versions/v3_train_plus_val/validation_report.json
  validation:
    min_session_length: 2
    min_item_frequency: 5
    max_session_length: 20
    allow_duplicates: true
  temporal_split:
    strategy: diginetica_legacy
    test_days: 7
    val_days: 0
  augmentation:
    min_prefix_length: 1
  training_example_format: graph
  parquet_compression: snappy
  compatibility:
    vocab_order: first_seen
    example_order: reverse
