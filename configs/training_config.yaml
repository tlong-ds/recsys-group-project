training:
  seed: 42
  batch_size: 128
  num_epochs: 5
  lr: 1.0e-3
  weight_decay: 1.0e-5
  early_stopping_patience: 2
  top_k: 20
  num_workers: 0

logging:
  level: INFO
  log_dir: logs

registry:
  root_path: models/trained

mlflow:
  enabled: true
  tracking_uri: http://mlflow:5000
  experiment_name: recsys_srgnn
  run_name: srgnn-parquet-training
