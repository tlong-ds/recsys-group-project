training:
  seed: 42
  device: auto
  batch_size: 512
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  num_epochs: 5
  lr: 1.0e-3
  weight_decay: 1.0e-5
  early_stopping_patience: 2
  top_k: 20
  train_metrics_path: metrics/training_metrics.json
  evaluation_metrics_path: metrics/evaluation_metrics.json

logging:
  level: INFO
  log_dir: logs

registry:
  root_path: models/trained
  create_versioned: true

mlflow:
  enabled: true
  tracking_uri: ""
  experiment_name: recsys_srgnn
  run_name: srgnn-parquet-training
  system_metrics:
    enabled: true
    sampling_interval: 1
    samples_before_logging: 1
  registry:
    enabled: false
    model_name: recsys-srgnn
    register_alias: Staging
  dagshub:
    enabled: true
    token_env_var: DAGSHUB_TOKEN
    username_env_var: DAGSHUB_USERNAME
    password_env_var: DAGSHUB_TOKEN
    repo_owner: lytlong.pers
    repo_name: recsys-group-project
