data:
  validation:
    min_session_length: 2
    min_item_frequency: 5
    max_session_length: 20
    allow_duplicates: true
  temporal_split:
    strategy: diginetica_legacy
    test_days: 7
    val_days: 7
    val_ratio: 0.15
    test_ratio: 0.15
  augmentation:
    min_prefix_length: 1
  training_example_format: graph
  parquet_compression: snappy
  compatibility:
    vocab_order: first_seen
    example_order: reverse

model:
  type: srgnn
  variant: srgnn
  name: srgnn
  version: "0.1.0"
  embedding_dim: 128
  hidden_size: 128
  step: 1
  max_session_length: 20
  fallback_weight: 0.15
  score_chunk_size: 512

training:
  top_k: 20

experiments:
  data_versions:
    - baseline
    - v1_strict_filter
    - v2_sliding_window
  model_profiles:
    - srgnn
    - srgnn_ngc
    - srgnn_fc
    - srgnn_l
    - srgnn_avg
    - srgnn_att
    - tagnn
    - ggnn
