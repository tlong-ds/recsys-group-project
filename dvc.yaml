          cache: false

  train_v2:
    cmd: python -m recsys.training.pipeline --stage train --dvc-mode --data-config configs/data_config.yaml --model-config configs/model_profiles/srgnn.yaml --training-config configs/training_config.yaml --params configs/data_versions/v2_sliding_window.yaml --registry-root models/trained/v2_sliding_window --train-metrics-path metrics/v2_sliding_window/training_metrics.json
    params:
      - configs/model_profiles/srgnn.yaml:
          - model.type
          - model.variant
          - model.device
          - model.name
          - model.version
          - model.embedding_dim
          - model.hidden_size
          - model.step
          - model.max_session_length
          - model.fallback_weight
          - model.score_chunk_size
      - configs/training_config.yaml:
          - training.top_k
    deps:
      - src/recsys/training/pipeline.py
      - src/recsys/training/mlflow_registry.py
      - src/recsys/training/trainer.py
      - src/recsys/training/registry.py
      - src/recsys/training/tracking.py
      - src/recsys/models/graph_helpers.py
      - src/recsys/models/srgnn.py
      # - src/recsys/models/tagnn.py
      - src/recsys/models/ggnn.py
      - src/recsys/evaluation/evaluator.py
      - src/recsys/evaluation/metrics.py
      - src/recsys/utils/config.py
      - src/recsys/utils/logger.py
      - configs/data_config.yaml
      - configs/model_profiles/srgnn.yaml
      - configs/training_config.yaml
      - configs/data_versions/v2_sliding_window.yaml
      - data/versions/v2_sliding_window/processed/train_examples.parquet
      - data/versions/v2_sliding_window/processed/val_examples.parquet
      - data/versions/v2_sliding_window/processed/item_vocab.json
      - data/versions/v2_sliding_window/processed/data_stats.json
    outs:
      - models/trained/v2_sliding_window/latest:
          cache: true
    metrics:
      - metrics/v2_sliding_window/training_metrics.json:
          cache: false

  eval_v2:
    cmd: python -m recsys.training.pipeline --stage evaluate --dvc-mode --data-config configs/data_config.yaml --model-config configs/model_profiles/srgnn.yaml --training-config configs/training_config.yaml --params configs/data_versions/v2_sliding_window.yaml --registry-root models/trained/v2_sliding_window --evaluation-metrics-path metrics/v2_sliding_window/evaluation_metrics.json
    params:
      - configs/model_profiles/srgnn.yaml:
          - model.type
          - model.variant
          - model.device
          - model.name
          - model.version
          - model.embedding_dim
          - model.hidden_size
          - model.step
          - model.max_session_length
